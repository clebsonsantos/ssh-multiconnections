name: Build & Release

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ─── 1. Cria a release no GitHub e expõe o release_id ──────────────────────
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.result }}
      version: ${{ steps.version.outputs.value }}

    steps:
      - uses: actions/checkout@v4

      - name: Read version from package.json
        id: version
        run: echo "value=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        id: create
        uses: actions/github-script@v7
        with:
          script: |
            const version = "${{ steps.version.outputs.value }}";
            const sha     = context.sha.slice(0, 7);
            const tag     = `v${version}-${sha}`;
            const name    = `v${version} (${sha})`;

            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              tag_name:               tag,
              name:                   name,
              body:                   `## SSH Multiconnect ${name}\n\nBuild automático gerado a partir do commit \`${context.sha}\`.\n\n### Downloads\n- **Linux** → \`.AppImage\` (portátil) ou \`.deb\` (Debian/Ubuntu)\n- **Windows** → \`.exe\` instalador NSIS`,
              draft:                  false,
              prerelease:             false,
              generate_release_notes: false,
            });

            return data.id;

  # ─── 2. Build matrix: Linux + Windows ──────────────────────────────────────
  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: Linux

          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows

    runs-on: ${{ matrix.platform }}
    name: Build — ${{ matrix.label }}

    steps:
      - uses: actions/checkout@v4

      # Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Rust
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # Dependências do sistema — Linux
      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            pkg-config

      # Dependências npm
      - name: Install npm dependencies
        run: npm ci

      # Build Tauri + upload na release criada
      - name: Build & upload release assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: --target ${{ matrix.target }}

  # ─── 3. Publica a release (sai do estado draft se necessário) ───────────────
  publish-release:
    needs: [create-release, build]
    runs-on: ubuntu-latest
    name: Publish Release

    steps:
      - name: Mark release as published
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner:      context.repo.owner,
              repo:       context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              draft:      false,
            });
            console.log("Release ${{ needs.create-release.outputs.release_id }} published.");
